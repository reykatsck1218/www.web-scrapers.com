# The base URL for your site
base_url = "https://www.web-scrapers.com"

# The title of your site
title = "Web-Scrapers.com"

# Site-wide description (SEO fallback for pages without their own description)
description = "Independent web scraping reviews, proxy benchmarks, and hands-on scraping guides with code samples in Python, PHP, Node.js, and Rust."

# The theme to use
theme = "tanuki"

# Whether to build a search index
build_search_index = true

# Generate RSS/Atom feeds
generate_feeds = true



# Extra configuration for the Tanuki theme
[extra]
ga4_id = "G-2340JEW0BT"
hotjar_id = 3142858
adsense_client = "ca-pub-2119108362521032"
# Slot ID for the end-of-article ad unit (templates/partials/adsense.html)
adsense_slot = "2937189529"

# SEO / social sharing
author = "Web-Scrapers.com"
og_image = "assets/og-image.png"
og_image_width = 1200
og_image_height = 630
og_image_alt = "Web-Scrapers.com — web scraping reviews, proxy benchmarks & guides"
# twitter_site = "@yourhandle"  # uncomment and set your real X/Twitter handle

# Branding: logo + favicons (see static/assets/)
logo = "logo.svg"
favicon = "assets/favicon.png"
favicon_svg = "assets/logo.svg"
apple_touch_icon = "assets/apple-touch-icon.png"
# Sets the site layout mode.
# Options: "docs", "book", "blog"
mode = "docs"
edit_url = "https://github.com/raskell-io/web-scrapers/blob/main/"

# Main navigation menu
[[extra.nav]]
name = "Proxy Providers"
url = "/proxy-providers/"

[[extra.nav]]
name = "Top Scrapers"
url = "/reviews/"

[[extra.nav]]
name = "Proxy Directory"
url = "/comparisons/"

[[extra.nav]]
name = "Industry Solutions"
url = "/solutions/"

[[extra.nav]]
name = "Learning Center"
url = "/learn/"
