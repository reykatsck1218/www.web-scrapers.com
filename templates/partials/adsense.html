{# ===== Google AdSense responsive display unit ===== #}
{# Renders only when both extra.adsense_client and extra.adsense_slot are set in config.toml #}
{% if config.extra.adsense_client and config.extra.adsense_slot %}
<div class="adsense-unit" style="margin: 2rem 0; text-align: center;">
    <ins class="adsbygoogle"
         style="display:block"
         data-ad-client="{{ config.extra.adsense_client }}"
         data-ad-slot="{{ config.extra.adsense_slot }}"
         data-ad-format="auto"
         data-full-width-responsive="true"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>
{% endif %}
